<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><style>
/* === 浅紫模板 · 小红书图文卡片 === */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#faf8fc;color:#2d2333}
.page{width:1080px;height:1440px;padding:88px 96px;display:flex;flex-direction:column;background:linear-gradient(180deg,#faf8fc 0%,#f3edf8 100%);page-break-after:always}

/* === Cover === */
.cover{justify-content:center;align-items:flex-start}
.badge{display:inline-block;font-size:22px;color:#8b6fbf;font-weight:600;background:rgba(139,111,191,.08);padding:8px 20px;border-radius:20px;margin-bottom:32px}
h1{font-size:84px;font-weight:700;line-height:1.22;letter-spacing:.05em}
.sub{font-size:28px;color:#8b7c99;margin-top:20px;line-height:1.5}

/* === Content page === */
h2{font-size:60px;font-weight:700;line-height:1.2;letter-spacing:.04em}
.tag{font-size:22px;color:#8b6fbf;font-weight:600;margin-bottom:20px;letter-spacing:.04em}
.num{font-size:148px;font-weight:700;color:#8b6fbf;line-height:1;margin-bottom:4px;opacity:.85}
.body{font-size:30px;line-height:1.78;color:#443a4d;margin-top:28px}
.body2{font-size:27px;line-height:1.65;color:#8b7c99;margin-top:16px}

/* === Highlight card === */
.insight{background:rgba(139,111,191,.07);padding:36px 44px;margin-top:auto;border-left:3px solid #8b6fbf;border-radius:0 12px 12px 0}
.insight p{font-size:28px;color:#3d2e4d;line-height:1.5}

/* === Closing page === */
.closing-row{display:flex;gap:24px;align-items:baseline;padding:20px 0;border-bottom:1px solid rgba(139,111,191,.12)}
.closing-row .cl-num{font-size:24px;font-weight:600;color:#8b6fbf;min-width:48px}
.closing-row .cl-text{font-size:28px;color:#443a4d;line-height:1.5}

/* === Shared === */
.footer{font-size:22px;color:#b8a6cc;margin-top:36px}
.stars-row{margin-top:56px;display:flex;flex-wrap:wrap;gap:14px 32px}
.stars-row span{font-size:26px;color:#6b5a7d}
.stars-row span.dot{color:#c4b3d6;font-weight:300}
.star-accent{position:absolute;right:80px;top:80px;font-size:200px;opacity:.03;color:#8b6fbf;pointer-events:none}
.tag-row{display:flex;gap:16px;margin-top:20px}

/* === Simple list === */
.item-row{display:flex;gap:20px;align-items:baseline;padding:18px 0;border-bottom:1px solid rgba(139,111,191,.08)}
.item-row .item-num{font-size:20px;font-weight:600;color:#b8a6cc;min-width:36px}
.item-row .item-text{font-size:28px;color:#443a4d;line-height:1.5}

/* === Dark card variant === */
.card-dark{background:#3d2e4d;padding:36px 44px;margin-top:32px;border-radius:12px}
.card-dark p{font-size:28px;color:#e0d4f0;line-height:1.5}
</style></head><body>

</body></html>
